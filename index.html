<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tunnel Proto</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#000; touch-action:none; }
  canvas { display:block; width:100vw; height:100vh; }
  #hud {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    color:#fff; font:bold 18px/1 'Segoe UI',sans-serif; text-align:center;
    pointer-events:none; z-index:10; text-shadow:0 0 10px rgba(0,200,255,0.5);
  }
  #prompt {
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font:16px/1 'Segoe UI',sans-serif;
    pointer-events:none; z-index:10; transition:opacity 0.3s;
  }
  #death-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:none; align-items:center; justify-content:center; flex-direction:column;
    z-index:20; color:#fff; font-family:'Segoe UI',sans-serif;
  }
  #death-overlay.show { display:flex; }
  #death-overlay h2 { font-size:28px; margin-bottom:12px; }
  #death-overlay p { font-size:16px; opacity:0.7; }
  #death-overlay button {
    margin-top:24px; padding:12px 32px; font-size:16px; font-weight:bold;
    background:rgba(0,200,255,0.2); color:#0cf; border:1px solid #0cf;
    border-radius:8px; cursor:pointer;
  }
</style>
</head>
<body>
<div id="hud">TUNNEL PROTO</div>
<div id="prompt">Swipe or arrow keys to turn</div>
<div id="death-overlay">
  <h2>CRASHED</h2>
  <p>Wrong turn or too slow</p>
  <button onclick="restartGame()">RETRY</button>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="tunnel.js"></script>
</body>
</html>
